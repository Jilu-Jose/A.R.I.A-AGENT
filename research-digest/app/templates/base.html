<!DOCTYPE html>
<html lang="en" id="html-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A.R.I.A — Autonomous Research Intelligence Agent.">
    <title>{% block title %}A.R.I.A{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

{% if current_user.is_authenticated %}
<div class="app-container">
    <aside class="sidebar" id="main-sidebar">
        <div class="sidebar-header">
            <div class="sidebar-brand">A.R.I.A</div>
            <div class="sidebar-subtitle">RESEARCH INTELLIGENCE</div>
        </div>

        <nav class="sidebar-nav">
            <a href="{{ url_for('dashboard.index') }}" class="side-link {% if request.endpoint == 'dashboard.index' %}active{% endif %}">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="side-icon"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 0 0 6 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 0 1 6 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 0 1 6-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0 0 18 18a8.967 8.967 0 0 0-6 2.292m0-14.25v14.25" /></svg> LATEST DIGEST
            </a>
            <a href="{{ url_for('dashboard.archives') }}" class="side-link {% if request.endpoint == 'dashboard.archives' %}active{% endif %}">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="side-icon"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" /></svg> ARCHIVES
            </a>
            <a href="{{ url_for('dashboard.library') }}" class="side-link {% if request.endpoint == 'dashboard.library' %}active{% endif %}">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="side-icon"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 12h16.5m-16.5 3.75h16.5M3.75 19.5h16.5M5.625 4.5h12.75a1.875 1.875 0 0 1 0 3.75H5.625a1.875 1.875 0 0 1 0-3.75Z" /></svg> LIBRARY
            </a>
            <a href="{{ url_for('settings.index') }}" class="side-link {% if request.endpoint and 'settings' in request.endpoint %}active{% endif %}">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="side-icon"><path stroke-linecap="round" stroke-linejoin="round" d="M12.75 19.5v-.75a7.5 7.5 0 0 0-7.5-7.5H4.5m0-6.75h.75c7.87 0 14.25 6.38 14.25 14.25v.75M6 18.75a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Z" /></svg> FEED SOURCES
            </a>
            <a href="{{ url_for('chat.index') }}" class="side-link {% if request.endpoint == 'chat.index' %}active{% endif %}" style="margin-top: 1rem; border-top: 1px solid var(--border); padding-top: 1rem;">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="side-icon"><path stroke-linecap="round" stroke-linejoin="round" d="M8.625 9.75a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0H8.25m4.125 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0H12m4.125 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0h-.375m-13.5 3.01c0 1.6 1.123 2.994 2.707 3.227 1.087.16 2.185.283 3.293.369V21l4.184-4.183a1.14 1.14 0 0 1 .778-.332 48.294 48.294 0 0 0 5.83-.498c1.585-.233 2.708-1.626 2.708-3.228V6.741c0-1.602-1.123-2.995-2.707-3.228A48.394 48.394 0 0 0 12 3c-2.392 0-4.744.175-7.043.513C3.373 3.746 2.25 5.14 2.25 6.741v6.018Z" /></svg> ASK A.R.I.A
            </a>
        </nav>

    </aside>

    <div class="main-wrapper">
        <header class="topbar">
            <button id="mobile-menu-btn" class="hamburger-btn" aria-label="Toggle Menu">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="24" height="24"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" /></svg>
            </button>
            <nav class="topbar-nav">
                <a href="{{ url_for('dashboard.index') }}" class="topbar-link {% if request.endpoint == 'dashboard.index' %}active{% endif %}">Dashboard</a>
                <a href="{{ url_for('settings.index') }}" class="topbar-link {% if request.endpoint and 'settings' in request.endpoint %}active{% endif %}">Settings</a>
                <a href="#" class="topbar-link" style="vertical-align: middle;">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" style="width: 18px; height: 18px;"><path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" /></svg>
                </a>
                <button class="topbar-link" id="theme-toggle" title="Toggle Theme" style="background:none; border:none; cursor:pointer; padding:0; margin-left:0.5rem; display:flex; align-items:center;">
                    <svg id="theme-icon-sun" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="18" height="18" style="display:none"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z"/></svg>
                    <svg id="theme-icon-moon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="18" height="18"><path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z"/></svg>
                </button>
                <a href="{{ url_for('auth.logout') }}" class="topbar-link topbar-logout">Logout</a>
            </nav>
        </header>

        <main class="main-content {% if request.endpoint == 'chat.index' %}main-content-flush{% endif %}">



            <div class="content-wrapper">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>
</div>

{% else %}
    <!-- Display for Login / Register without Sidebar -->

    {% block auth_content %}{% endblock %}
{% endif %}

<div id="toast-container" class="toast-container"></div>
{% if current_user.is_authenticated %}
<form method="POST" action="{{ url_for('dashboard.run_now') }}" id="fab-run-form" style="display:none;"></form>
<button class="fab-run-digest" onclick="document.getElementById('fab-run-form').submit()" title="Run Digest Now">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="24" height="24"><path stroke-linecap="round" stroke-linejoin="round" d="m3.75 13.5 10.5-11.25L12 10.5h8.25L9.75 21.75 12 13.5H3.75Z" /></svg>
</button>
{% endif %}

<script src="{{ url_for('static', filename='app.js') }}"></script>
<script>
  window.showToast = function(message, category) {
      const container = document.getElementById('toast-container');
      if(!container) return;
      const toast = document.createElement('div');
      toast.className = `toast toast-${category}`;
      toast.innerHTML = `<span style="font-size:0.8rem; font-weight:600;">${message}</span>`;
      if(category === "error") {
          toast.style.borderLeftColor = "#ef4444";
      }
      container.appendChild(toast);
      requestAnimationFrame(() => {
          setTimeout(() => toast.classList.add('toast-visible'), 50);
      });
      setTimeout(() => {
          toast.classList.remove('toast-visible');
          setTimeout(() => toast.remove(), 400);
      }, 4000);
  };
</script>
<script>
  // Apply saved theme before paint to avoid flash
  (function(){
    var t = localStorage.getItem('aria_theme') || 'light';
    document.getElementById('html-root').setAttribute('data-theme', t);
  })();

  document.addEventListener('DOMContentLoaded', function() {
      const toggleBtn = document.getElementById('theme-toggle');
      if(toggleBtn) {
          const sunIcon = document.getElementById('theme-icon-sun');
          const moonIcon = document.getElementById('theme-icon-moon');
          
          function updateIcons(t) {
              if(sunIcon) sunIcon.style.display = t === 'dark' ? 'block' : 'none';
              if(moonIcon) moonIcon.style.display = t === 'light' ? 'block' : 'none';
          }
          
          updateIcons(document.documentElement.getAttribute('data-theme'));
          
          toggleBtn.addEventListener('click', function() {
              const current = document.documentElement.getAttribute('data-theme') || 'light';
              const next = current === 'light' ? 'dark' : 'light';
              document.documentElement.setAttribute('data-theme', next);
              localStorage.setItem('aria_theme', next);
              updateIcons(next);
          });
      }

      // Mobile Menu Toggle logic
      const mobileBtn = document.getElementById('mobile-menu-btn');
      const sidebar = document.getElementById('main-sidebar');
      if(mobileBtn && sidebar) {
          mobileBtn.addEventListener('click', function() {
              sidebar.classList.toggle('sidebar-open');
          });
          
          // Close sidebar if clicked outside on mobile via basic event delegation
          document.addEventListener('click', function(e) {
              if (sidebar.classList.contains('sidebar-open') && !sidebar.contains(e.target) && !mobileBtn.contains(e.target)) {
                  sidebar.classList.remove('sidebar-open');
              }
          });
      }
      
      // Page Fade-in transition logic
      document.body.classList.add('page-loaded');

      // Ripple Effect Engine
      const buttons = document.querySelectorAll('.btn, .fab-run-digest, .cm-icon-btn');
      buttons.forEach(btn => {
          btn.addEventListener('click', function(e) {
              let ripple = document.createElement('span');
              ripple.classList.add('ripple');
              this.appendChild(ripple);
              const rect = this.getBoundingClientRect();
              let x = e.clientX - rect.left;
              let y = e.clientY - rect.top;
              ripple.style.left = `${x}px`;
              ripple.style.top = `${y}px`;
              setTimeout(() => ripple.remove(), 600);
          });
      });

      // Render any flashes passed from backend
      {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
          {% for category, message in messages %}
          showToast("{{ message | safe }}", "{{ category }}");
          {% endfor %}
      {% endif %}
      {% endwith %}

  });
</script>
</body>
</html>
